version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: myproject_postgres_prod

    restart: always

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./scrips:/scripts

    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8

    shm_size: 256mb

    command: 
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - max_connections=200
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=5242kB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
    
    networks:
      - myproject_network
    
  
  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile

    container_name: myproject_web_prod

    restart: always

    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
      - ./logs:/app/logs
    
    env_file:
      - .env
    
    environment:
      - DJANGO_SETTINGS_MODULE=myproject.settings.production

    depends_on:
      postgres:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 256M
    
    networks:
      - myproject_network
    
  

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile

    container_name: myproject_nginx_prod

    restart: always

    ports:
      - "80:80"
      - "443:443"  

    volumes:
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./logs/nginx:/var/log/nginx

    depends_on:
      - web
    
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          memory: 128M
    
    networks:
      - myproject_network

  redis:
    image: redis:7-alpine
    container_name: myproject_redis

    restart: always

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    
    networks:
      - myproject_network


volumes:
  postgres_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  redis_data:
    driver: local

networks:
  myproject_network:
    driver: bridge

