name: Django CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  REGISTRY: docker.io

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
      
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Run Black (formatting check)
      run: black --check .
      continue-on-error: true

    - name: Run isort (import sorting)
      run: isort --check-only
      continue-on-error: true
    
    - name: Run Flake8 (linting)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics


  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
        pip install -r requirements.txt

    - name: Run Safety (dependency Vulnerabilities)
      run: safety check --json
      continue-on-error: true
    
    - name: Run Bandit (code security issues)
      run: bandit -r . -f json
      continue-on-error: true
  

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint, security]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - name: Chekout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage
    
    - name: Run migrations
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
        DJANGO_SETTINGS_MODULE: myproject.settings.development
        SECRET_KEY: django-insecure-9!snic85yj4sn1cg5gco2x9bq#!$&0mx7jzkon#!rh!#jyijd)
      run: |
        coverage run --source='.' manage.py test
        coverage report
        coverage html
    
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Extract metadata for Django image
      id: meta-django
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/myproject-web
        tags: |
          type=ref,event=branch
          type=sha,prefic={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Django image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/django/Dockerfile
        push: true
        tags: ${{ steps.meta-django.outputs.tags }}
        cache-from: type=registry, ref=${{ secrets.DOCKER_USERNAME}}/myproject-web:latest
        cache-to: type=inline

    - name: Build and push Nginx image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/nginx/Dockerfile
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/myproject-nginx:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - name: Deploy to VPS via ssh
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          cd ~/myproject

          git pull origin main
          
          docker-compose -f docker-compose.prod.yml pull

          docker-compose -f docker-compose.prod.yml exec -T postgres /scripts/backup_db.sh

          docker-compose -f docker-compose.prod.yml down

          docker-compose -f docker-compose.prod.yml up -d --build

          sleep 10

          docker-compose -f docker-compose.prod.yml exec -T web python manage.py migrate --noinput

          docker-compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput

          docker system prune -f

          echo "Deployment completed successfully !!"

