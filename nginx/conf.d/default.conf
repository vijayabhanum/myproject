upstream django {
    server web:8000;
}

limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=200r/m;

server {
    listen 80;
    listen [::]:80;
    server_name 72.61.5.123;

    #location /.well-known/acme-challenge/ {
    #    root /var/www/certbot;
    #}

    #location / {
    #    return 301 https://$server_name$request_url;
    #}
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name 72.61.5.123;

    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    add_header Strict-Transport-Security "max-age=63072000;
    includeSubDomains; preload" always;

    add_header X-Frame-Options "SAMEORIGIN" always;

    add_header X-Content-Type-Options "nosniff" always;

    add_header X-XSS-Protection "1; mode=block" always;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 100M;

    client_body_timeout 120s;
    client_header_timeout 120s;
    keepalive_timeout 65s;
    send_timeout 120s;

    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    root /app;

    location = /favicon.ico {
        alias /app/static/favicon.ico;
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location = /robots.txt {
        alias /app/static/robots.txt;
        access_log off;
        log_not_found off;
        expires 7d;
    }

    location /static/ {
        alias /app/static/;

        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /media/ {
        alias /app/media/;

        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
        location ~ \.(php|py|pl|sh|cgi|exe|bat)$ {
            deny all;
        }
    }

    location /health/ {
        access_log off;
        proxy_pass http://django;
        proxy_set_header Host $host;
    }
}